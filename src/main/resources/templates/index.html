<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>じゃんけん</title>
	
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<!--ヘッダー-->
	<div class="header">
		<div class="title">
			ROCK <br>
			PAPER <br>
			SCISSORS
		</div>
		<div class="reset">
			<button type="submit" name="reset">
				スコアリセット
			</button>
		</div>
		<div class="score">
			SCORE
			<p th:text="${score}"></p>
		</div>
	</div>
	<!--ゲームエリア-->
	<div class="game-area">
		<form action="/play" method="post">
			<!--上段の手-->
			<div class="top">
				<div class="scissors">
					<button type="submit" name="hand" value="チョキ">
						<img th:src="@{/images/janken_choki.png}" class="jankenHand">
					</button>
				</div>
			</div>
			<!--下段の手-->
			<div class="bottom">
				<div class="rock">
					<button type="submit" name="hand" value="グー">
						<img th:src="@{/images/janken_gu.png}" class="jankenHand">
					</button>
				</div>
				<div class="paper">
					<button type="submit" name="hand" value="パー">
						<img th:src="@{/images/janken_pa.png}" class="jankenHand">
					</button>
				</div>
			</div>
		</form>
	</div>
	<!-- TODO: th:ifでjudgeResultがある場合のみ表示し、初期表示時に空欄が見えないようにする -->
	<!-- TODO: class="result"が重複しているため、"user-hand"と"cpu-hand"等に分けてCSSで個別スタイルを当てられるようにする -->
	<!-- TODO: テキストだけでなく、選択した手の画像も表示するとUIとして自然になる -->
	<!--Modelに格納された値を表示（選択した手の表示）-->
	<div class="result">
		<p th:text="${hand}"></p>
	</div>
	<!--相手の手を表示-->
	<div class="result">
		<p th:text="${cpuHand}"></p>
	</div>
	<!--勝敗結果の表示-->
	<div class="judgeResult">
		<p th:text="${judgeResult}"></p>
	</div>
	<!-- TODO: SCOREが固定値0のままなので、勝敗に応じてスコアを更新する（セッション等で管理） -->
	<!-- TODO: RULESの内容が未実装。グー＞チョキ、チョキ＞パー、パー＞グー等のルール説明を追加する -->
	<!--ルール表示-->
	<div class="footer">
		RULES
	</div>

</body>
</html>
